services:
  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    image: calo-client:latest
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: http://localhost:3001
    depends_on:
      - server
    networks:
      - app-network
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    image: calo-server:latest
    ports:
      - "3001:3001"
    networks:
      - app-network
    environment:
      PORT: 3001
      MONGO_USERNAME: admin
      MONGO_PASSWORD: admin
      MONGO_DATABASE: minishopdb
networks:
  app-network:
    driver: bridge
    